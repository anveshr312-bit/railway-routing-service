name: Hugging Face Space Keep-Alive

on:
  schedule:
    # Run every hour
    - cron: '0 * * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  ping-health-endpoint:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Railway Routing Service Health Endpoint
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "Executing health ping at $TIMESTAMP"
          
          # Use curl with explicit User-Agent. Store response body and HTTP code.
          # -s: silent, -w: write-out format, -A: User-Agent
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -A "RailwayRoutingKeepAlive/1.0" https://anveshr312-railway-routing-service.hf.space/health)
          
          # Extract body and status code
          BODY=$(echo "$RESPONSE" | sed -e '$ d')
          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1 | grep -o 'HTTP_STATUS:[0-9]*' | cut -d':' -f2)
          
          echo "Response Code: $HTTP_STATUS"
          echo "Response Body: $BODY"
          
          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "Service is healthy and awake."
            exit 0
          else
            echo "Service is unreachable or unhealthy."
            exit 1
          fi
